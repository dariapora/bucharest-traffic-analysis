<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #0f1117; color: #e0e0e0; }
  #map { width: 100%; height: 100vh; }

  .control-panel {
    position: absolute; top: 16px; left: 60px; z-index: 1000;
    background: rgba(15,17,23,0.92); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 16px 20px; min-width: 340px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .control-panel h1 {
    font-size: 15px; font-weight: 700; letter-spacing: -0.3px;
    margin-bottom: 4px; color: #fff;
  }
  .control-panel .subtitle {
    font-size: 11px; color: #888; margin-bottom: 14px;
  }

  .time-label {
    font-size: 26px; font-weight: 700; color: #fff;
    letter-spacing: -1px; margin-bottom: 2px;
  }
  .time-label span { color: #666; font-weight: 400; font-size: 14px; }

  .slider-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
  .slider-row input[type=range] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 6px; border-radius: 3px;
    background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
    outline: none;
  }
  .slider-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    border-radius: 50%; background: #fff; cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }

  .layer-toggles { display: flex; gap: 8px; margin-top: 10px; }
  .layer-toggles button {
    flex: 1; padding: 7px 0; border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; background: rgba(255,255,255,0.04);
    color: #aaa; font-family: inherit; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .layer-toggles button.active {
    background: rgba(255,255,255,0.12); color: #fff;
    border-color: rgba(255,255,255,0.25);
  }

  .legend {
    display: flex; align-items: center; gap: 6px;
    margin-top: 12px; font-size: 10px; color: #888;
  }
  .legend-bar {
    flex: 1; height: 6px; border-radius: 3px;
    background: linear-gradient(90deg, #e74c3c, #f39c12, #f1c40f, #2ecc71);
  }

  .stats-bar {
    display: flex; gap: 12px; margin-top: 12px;
    padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06);
  }
  .stat { text-align: center; flex: 1; }
  .stat .val { font-size: 18px; font-weight: 700; color: #fff; }
  .stat .lbl { font-size: 10px; color: #666; margin-top: 2px; }

  .leaflet-popup-content-wrapper {
    background: rgba(15,17,23,0.95) !important;
    color: #e0e0e0 !important; border-radius: 8px !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
  }
  .leaflet-popup-tip { background: rgba(15,17,23,0.95) !important; }
  .leaflet-popup-content { font-family: 'DM Sans', sans-serif; font-size: 12px; }
  .popup-title { font-weight: 700; font-size: 13px; margin-bottom: 6px; color: #fff; }
  .popup-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .popup-row .k { color: #888; }
  .popup-row .v { font-weight: 500; }
</style>
</head>

    <div class="stat"><div class="val" id="statSamples">—</div><div class="lbl">Probes</div></div>
  </div>
</div>

const TIME_SLOTS = [
  { id: "2", label: "06:00–08:00" },
  { id: "3", label: "08:00–10:00" },
  { id: "4", label: "10:00–12:00" },
  { id: "5", label: "12:00–14:00" },
  { id: "6", label: "14:00–16:00" },
  { id: "7", label: "16:00–18:00" },
  { id: "8", label: "18:00–20:00" }
];

// Map setup
const map = L.map('map', {
  center: [44.4406, 26.0971],
  zoom: 15,
  zoomControl: false
});

L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OSM &copy; CARTO',
  maxZoom: 19
}).addTo(map);

// Layers
let segmentLines = [];
let heatLayer = null;
let showSegments = true;
let showHeatmap = true;

function speedRatio(seg, tsId) {
  const t = seg.ts[tsId];
  if (!t || !seg.sl || seg.sl === 0) return 1;
  return Math.min(t.as / seg.sl, 1.0);
}

function ratioToColor(r) {
  // 0 = full congestion (red), 1 = free flow (green)
  if (r >= 0.8) return '#2ecc71';
  if (r >= 0.6) return '#a3d977';
  if (r >= 0.45) return '#f1c40f';
  if (r >= 0.3) return '#f39c12';
  return '#e74c3c';
}

function ratioToWeight(r) {
  return r < 0.5 ? 5 : 3;
}

function buildPopup(seg, tsId) {
  const t = seg.ts[tsId];
  if (!t) return seg.name || 'Unknown';
  const ratio = speedRatio(seg, tsId);
  const pct = Math.round(ratio * 100);
  return `
    <div class="popup-title">${seg.name || 'Unnamed segment'}</div>
    <div class="popup-row"><span class="k">Avg speed</span><span class="v">${t.as} km/h</span></div>
    <div class="popup-row"><span class="k">Speed limit</span><span class="v">${seg.sl} km/h</span></div>
    <div class="popup-row"><span class="k">Flow ratio</span><span class="v" style="color:${ratioToColor(ratio)}">${pct}%</span></div>
    <div class="popup-row"><span class="k">Harmonic spd</span><span class="v">${t.hs} km/h</span></div>
    <div class="popup-row"><span class="k">Samples</span><span class="v">${t.ss}</span></div>
    <div class="popup-row"><span class="k">FRC</span><span class="v">${seg.frc}</span></div>
    <div class="popup-row"><span class="k">Length</span><span class="v">${seg.d} m</span></div>
  `;
}

function updateMap(slotIndex) {
  const slot = TIME_SLOTS[slotIndex];
  const tsId = slot.id;

  document.getElementById('timeLabel').innerHTML = slot.label + ' <span>interval</span>';

  // Clear old
  segmentLines.forEach(l => map.removeLayer(l));
  segmentLines = [];
  if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }

  const heatPoints = [];
  let totalSpeed = 0, totalSamples = 0, congestedCount = 0, count = 0;

  SEGMENTS.forEach(seg => {
    const t = seg.ts[tsId];
    if (!t) return;

    const ratio = speedRatio(seg, tsId);
    const color = ratioToColor(ratio);

    // Segment polyline
    if (showSegments) {
      const line = L.polyline(seg.coords, {
        color: color,
        weight: ratioToWeight(ratio),
        opacity: 0.85,
        lineJoin: 'round'
      }).bindPopup(buildPopup(seg, tsId));
      line.addTo(map);
      segmentLines.push(line);
    }

    // Heatmap points — use midpoint of segment, intensity = inverse of ratio
    if (showHeatmap) {
      const mid = seg.coords[Math.floor(seg.coords.length / 2)];
      const intensity = (1 - ratio) * (t.ss / 50); // weight by sample size
      heatPoints.push([mid[0], mid[1], intensity]);
    }

    totalSpeed += t.as;
    totalSamples += t.ss;
    if (ratio < 0.5) congestedCount++;
    count++;
  });

  if (showHeatmap && heatPoints.length > 0) {
    heatLayer = L.heatLayer(heatPoints, {
      radius: 18, blur: 22, maxZoom: 17,
      gradient: { 0.2: '#2ecc71', 0.4: '#f1c40f', 0.6: '#f39c12', 0.8: '#e74c3c', 1.0: '#c0392b' }
    }).addTo(map);
  }

  // Stats
  document.getElementById('statAvgSpeed').textContent = count ? Math.round(totalSpeed / count) + ' km/h' : '—';
  document.getElementById('statCongested').textContent = Math.round(congestedCount / count * 100) + '%';
  document.getElementById('statSamples').textContent = totalSamples.toLocaleString();
}

function toggleLayer(layer) {
  if (layer === 'segments') {
    showSegments = !showSegments;
    document.getElementById('btnSegments').classList.toggle('active');
  } else {
    showHeatmap = !showHeatmap;
    document.getElementById('btnHeatmap').classList.toggle('active');
  }
  updateMap(parseInt(document.getElementById('timeSlider').value));
}

document.getElementById('timeSlider').addEventListener('input', (e) => {
  updateMap(parseInt(e.target.value));
});

// Initial render
updateMap(0);
</script>
