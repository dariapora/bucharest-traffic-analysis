<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Highlight Street by Name</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: #0f1117;
      color: #e8e8e8;
    }

    #controls {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: #0f1117;
      border-bottom: 1px solid #2a2d38;
      flex-wrap: wrap;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666;
    }

    input {
      background: #1a1d27;
      border: 1px solid #2e3140;
      border-radius: 6px;
      color: #e8e8e8;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 7px 12px;
      outline: none;
      width: 220px;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #5b7fff; }

    button {
      background: #5b7fff;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 20px;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #7090ff; }
    button:active { transform: scale(0.97); }
    button:disabled { background: #3a3d50; cursor: not-allowed; }

    #status {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #888;
      margin-left: auto;
    }
    #status.error { color: #ff6b6b; }
    #status.success { color: #6bffb8; }

    #map {
      height: calc(100vh - 60px);
    }

    /* Leaflet dark theme tweaks */
    .leaflet-tile { filter: brightness(0.6) saturate(0.4); }
    .leaflet-control-attribution { background: rgba(15,17,23,0.8) !important; color: #555 !important; }
    .leaflet-control-attribution a { color: #666 !important; }
    .leaflet-bar a { background: #1a1d27 !important; color: #e8e8e8 !important; border-color: #2e3140 !important; }
    .leaflet-bar a:hover { background: #2a2d38 !important; }
  </style>
</head>
<body>

<div id="controls">
  <span class="label">Street</span>
  <input id="street" value="Bulevardul Unirii" />
  <span class="label">City</span>
  <input id="city" value="București" style="width:150px" />
  <button id="btn" onclick="highlightStreet()">Highlight</button>
  <span id="status"></span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // Load osmtogeojson dynamically (unpkg path was broken)
  const osmScript = document.createElement('script');
  osmScript.src = 'https://cdn.jsdelivr.net/npm/osmtogeojson@3.0.0-beta.5/osmtogeojson.js';
  document.head.appendChild(osmScript);

  const map = L.map('map').setView([44.4268, 26.1025], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);

  let streetLayer = null;
  const statusEl = document.getElementById('status');
  const btn = document.getElementById('btn');

  function setStatus(msg, type = '') {
    statusEl.textContent = msg;
    statusEl.className = type;
  }

  async function highlightStreet() {
    const street = document.getElementById('street').value.trim();
    const city = document.getElementById('city').value.trim();

    if (!street) { alert('Please enter a street name'); return; }

    if (streetLayer) { map.removeLayer(streetLayer); streetLayer = null; }

    btn.disabled = true;

    // Wait for osmtogeojson to be available
    if (typeof osmtogeojson === 'undefined') {
      await new Promise(res => osmScript.addEventListener('load', res));
    }

    let bbox; // [south, west, north, east]

    if (city) {
      // Step 1: Use Nominatim to geocode the city and get its bounding box.
      // This is much faster and more reliable than Overpass area queries.
      setStatus('Geocoding city…');
      try {
        const nomUrl = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city)}&format=json&limit=1&addressdetails=0`;
        const nomRes = await fetch(nomUrl, { headers: { 'Accept-Language': 'en' } });
        const nomData = await nomRes.json();
        if (!nomData.length) {
          setStatus(`City "${city}" not found.`, 'error');
          btn.disabled = false;
          return;
        }
        const place = nomData[0];
        // boundingbox is [south, north, west, east] in Nominatim
        const bb = place.boundingbox;
        bbox = [parseFloat(bb[0]), parseFloat(bb[2]), parseFloat(bb[1]), parseFloat(bb[3])];

        // Pan map to city
        map.fitBounds([[bbox[0], bbox[1]], [bbox[2], bbox[3]]]);
      } catch (e) {
        setStatus('Geocoding failed: ' + e.message, 'error');
        btn.disabled = false;
        return;
      }
    } else {
      // No city: use current map view as bbox
      const b = map.getBounds();
      bbox = [b.getSouth(), b.getWest(), b.getNorth(), b.getEast()];
    }

    // Step 2: Query Overpass by bbox — fast and reliable
    setStatus('Querying Overpass…');
    const [s, w, n, e] = bbox;
    const query = `[out:json][timeout:25];(way["highway"]["name"~"${street}",i](${s},${w},${n},${e}););out geom;`;

    try {
      const response = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'data=' + encodeURIComponent(query)
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const osmData = await response.json();

      if (!osmData.elements || osmData.elements.length === 0) {
        setStatus('Street not found.', 'error');
        btn.disabled = false;
        return;
      }

      const geojson = osmtogeojson(osmData);

      streetLayer = L.geoJSON(geojson, {
        style: { color: '#5b7fff', weight: 5, opacity: 0.9 },
        filter: f => f.geometry.type !== 'Point'
      }).addTo(map);

      const bounds = streetLayer.getBounds();
      if (bounds.isValid()) map.fitBounds(bounds, { padding: [40, 40] });

      console.log(osmData);
      const count = osmData.elements.filter(e => e.type === 'way').length;
      setStatus(`Found ${count} segment${count !== 1 ? 's' : ''}`, 'success');

    } catch (err) {
      console.error(err);
      setStatus('Error: ' + err.message, 'error');
    }

    btn.disabled = false;
  }
</script>
</body>
</html>
